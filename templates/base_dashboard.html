<!doctype html>
<html lang="en">
{% load static %}

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="{% static 'hotel/css/base_dashboard.css' %}">
    <!-- favicon apple-->
    <link rel="icon" href="{% static 'hotel/img/icons/favicon.ico' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'hotel/img/icons/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'hotel/img/icons/favicon-16x16.png' %}">
    <link rel="apple-touch-icon" href="{% static 'hotel/img/icons/apple-touch-icon.png' %}">
    <link rel="manifest" href="{% static 'hotel/img/icons/site.webmanifest' %}">

  {% block title %}{% endblock %}
  {% block extra-head %}{% endblock %}

    <style>

</style>

</head>

<body>

  <div class="d-flex">

    <div id="sidebar">
      <div class="" id="">
        <a href="{% url 'hotel:home'%}" class="navbar-brand text-center text-light w-100 p-4 ">
          <img src="{% static 'hotel/img/logo-bycoleccion2.png'%}" class="logo-blanco" style="">
        </a>
      </div>
      <div class="hijo active">
        <a href="{% url 'hotel:dashboard' %}" class="">
            <i class="fa fa-tachometer mr-3" aria-hidden="true"></i>
          </a>
      </div>

      <div class="hijo active">
        <a href="{% url 'hotel:newcontract'%}" class=" ">
            <i class="fa fa-bed mr-3" aria-hidden="true"></i>
          </a>
      </div>

      <div class="hijo active">
         <a href="{% url 'hotel:contratos' %}" class="">
            <i class="fa fa-user mr-3" aria-hidden="true"></i>
          </a>
      </div>

      <div class="hijo active">
         <a href="{% url 'hotel:habitaciones_dashboard' %}" class="">
           <i class="fa fa-calendar mr-3" aria-hidden="true"></i>
          </a>
      </div>

      <div class="hijo active">
         <a href="#dashboard-items" data-toggle="collapse" aria-expanded="false"
            class="">
            <i class="fa fa-cog mr-3" aria-hidden="true"></i>
          </a>
      </div>
        </div>
      </div>

  <div id="centerside">{% block content %}{% endblock %}</div>



  <script>
        {% block jquery %}

        {% endblock %}

  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
